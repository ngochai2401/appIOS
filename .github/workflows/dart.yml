name: Build iOS IPA (No Sign)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: 📦 Flutter pub get
        working-directory: remotelensapp
        run: flutter pub get

      - name: 🔧 Fix signing (IMPORTANT)
        working-directory: remotelensapp
        run: |
          sed -i '' 's/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = "";/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: 📦 Build IPA
        working-directory: remotelensapp
        run: flutter build ipa --release --no-codesign

      - name: 📤 Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: remotelensapp/build/ios/ipa/*.ipa
