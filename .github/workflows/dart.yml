name: iOS-ipa-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Get dependencies
        run: flutter pub get
        working-directory: remotelensapp

      - name: 🍎 Update CocoaPods
        run: pod repo update
        working-directory: remotelensapp/ios

      - name: 🛠 Build iOS
        run: flutter build ios --release --no-codesign
        working-directory: remotelensapp

      - name: 📦 Create IPA structure
        run: |
          mkdir Payload
          mv Runner.app Payload/
        working-directory: remotelensapp/build/ios/iphoneos

      - name: 📦 Zip IPA
        run: zip -qq -r -9 FlutterIpaExport.ipa Payload
        working-directory: remotelensapp/build/ios/iphoneos

      - name: 🚀 Upload IPA
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: remotelensapp/build/ios/iphoneos/FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"
