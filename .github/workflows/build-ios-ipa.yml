name: Build iOS IPA

on:
  push:
    branches:
      - hai
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Đôi khi giúp ổn định hơn

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true

      # Bước quan trọng: Đảm bảo đang ở đúng thư mục gốc
      - name: Check current directory and files
        run: |
          pwd
          ls -la
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ Không tìm thấy pubspec.yaml ở thư mục gốc!"
            echo "Danh sách thư mục:"
            ls -R | head -n 30
            exit 1
          fi
          echo "✅ pubspec.yaml tồn tại → OK"

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build IPA
        run: flutter build ipa --release --no-codesign

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotelensapp-ios-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 7
