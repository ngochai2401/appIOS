name: Build iOS IPA

on:
  push:
    branches:
      - hai
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    defaults:
      run:
        working-directory: remotelensapp   # ← Quan trọng nhất

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          cache: true
          architecture: arm64

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: remotelensapp/ios     # ← Ghi rõ đường dẫn đầy đủ
        run: pod install

      - name: Build IPA
        run: flutter build ipa --release --no-codesign

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotelensapp-ios-ipa
          path: remotelensapp/build/ios/ipa/*.ipa   # ← Thêm remotelensapp/
          retention-days: 7
