name: Build iOS IPA

on:
  push:
    branches:
      - hai
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          cache: true
          architecture: arm64

      - name: Get dependencies
        working-directory: remotelensapp
        run: flutter pub get

      - name: Build Flutter iOS engine (no codesign)
        working-directory: remotelensapp
        run: flutter build ios --release --no-codesign

      - name: Install CocoaPods
        working-directory: remotelensapp/ios
        run: |
          pod deintegrate || true
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Archive with xcodebuild (force no codesign)
        working-directory: remotelensapp/ios
        run: |
          xcodebuild archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath ../build/ios/archive/Runner.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA (no codesign)
        working-directory: remotelensapp
        run: |
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/ios/ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotelensapp-ios-ipa
          path: remotelensapp/build/ios/ipa/*.ipa
          retention-days: 7
